# Tmux config

# Use C-a instead
unbind C-b
set -g prefix C-a
bind a send-prefix

bind r source-file ~/.tmux.conf \; display-message "tmux configuration reloaded"

# base settings
set-option -g default-shell /bin/zsh
set-option -g mouse on
set -s escape-time 0
set -g status-interval 1
set -g default-terminal "tmux-256color"
set -as terminal-features ',xterm-256color:RGB'
set -g focus-events on
setw -g aggressive-resize on

# Support for shift-enter
set -g extended-keys on
set -as terminal-features 'xterm*:extkeys'
bind-key -n S-Enter send-keys -l "\e[13;2u"

# set 1 as base index for numbering
set-option -g base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

set -g status "on"
set -g status-left ''
set -g status-right '#{prefix_highlight}'
set -g status-bg "#3c3836"
setw -g window-status-separator ""
setw -g window-status-format "#[fg=#a89984,bg=#3c3836] #I | #W "
setw -g window-status-current-format "#[fg=#282828,bg=#a89984] #I | #W "
set -g @prefix_highlight_fg '#282828'
set -g @prefix_highlight_bg '#a89984'
set -g message-style fg="#a89984",bg="#4c3836"

# Vim-tmux pane navigation handled by christoomey/vim-tmux-navigator plugin (TPM).
# C-Space is not covered by the plugin, so bind it manually.
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
bind-key -n 'C-Space' if-shell "$is_vim" 'send-keys C-Space' 'select-pane -t:.+'
bind-key -T copy-mode-vi 'C-Space' select-pane -t:.+

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sessionist'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'

# initialize tmux plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
